<!DOCTYPE html>
<html>
<head>
    <title>Authentication Handler</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 50px; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>
    <h2>Authenticating...</h2>
    <div class="spinner"></div>
    <p id="status">Processing your authentication request</p>

    <script>
        (function() {
            // Extract access_token from URL fragment (#)
            const fragment = window.location.hash.substring(1);
            const fragmentParams = new URLSearchParams(fragment);
            const accessToken = fragmentParams.get('access_token');
            
            // Extract redirect_url from query params (?)
            const queryParams = new URLSearchParams(window.location.search);
            const redirectUrl = queryParams.get('redirect_url');
            
            const statusEl = document.getElementById('status');
            
            if (!accessToken) {
                statusEl.className = 'error';
                statusEl.textContent = 'Error: No access token found. Please try authenticating again.';
                return;
            }
            
            // Build backend URL
            let backendUrl = 'auth/google/token?access_token=' + encodeURIComponent(accessToken);
            if (redirectUrl) {
                backendUrl += '&redirect_url=' + encodeURIComponent(redirectUrl);
            }
            
            // Call backend to authenticate
            fetch(backendUrl)
                .then(response => {
                    if (!response.ok) {
                        throw new Error('HTTP ' + response.status);
                    }
                    return response.json();
                })
                .then(authResponse => {
                    statusEl.className = 'success';
                    statusEl.textContent = 'Authentication successful! Redirecting to app...';
                    
                    const authData = authResponse.data;

                    // Build deep link with auth tokens
                    const deepLink = `hashtaglocalfrontend://auth/callback?` +
                        `access_token=${encodeURIComponent(authData.access_token.value)}` +
                        `&refresh_token=${encodeURIComponent(authData.refresh_token.value)}` +
                        `&access_expiry=${authData.access_token.expiry}` +
                        `&refresh_expiry=${authData.refresh_token.expiry}`;
                    
                    console.log(deepLink)
                    
                    // Store data in sessionStorage as backup
                    sessionStorage.setItem('authData', JSON.stringify(authResponse));
                    
                    // Attempt to open deep link
                    const timeout = setTimeout(() => {
                        // Fallback if app doesn't open - try custom scheme
                        console.log('App did not respond, trying fallback...');
                    }, 500);
                    
                    // Try to open the deep link
                    window.location.href = deepLink;
                    
                    // Clear timeout if deep link worked
                    setTimeout(() => {
                        clearTimeout(timeout);
                        // If we're still here after 3 seconds, deep link didn't work
                        // Try to close this window
                        window.close();
                    }, 3000);
                })
                .catch(error => {
                    statusEl.className = 'error';
                    statusEl.textContent = 'Authentication failed: ' + error.message + '. Please try again.';
                    console.error('Auth error:', error);
                });
        })();
    </script>
</body>
</html>
