spring:
  application:
    name: hashtaglocal-backend
  jackson:
    property-naming-strategy: SNAKE_CASE

  datasource:
    url: jdbc:postgresql://localhost:5432/hashtaglocal
    username: username
    password: password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  sql:
    init:
      mode: always
  # Added: SMTP settings for sending admin notification emails on account deletion requests
  mail:
    host: ${SPRING_MAIL_HOST:}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SPRING_MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${SPRING_MAIL_SMTP_STARTTLS_ENABLE:true}
          from: ${SPRING_MAIL_SMTP_FROM:}
          localhost: ${SPRING_MAIL_SMTP_LOCALHOST:}

logging:
  level:
    root: INFO
    org.smalltech.hashtaglocal_backend: DEBUG
  file:
    name: logs/application.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 10

# Application-specific custom configuration
app:
  geo:
    verify-radius-meters: 100

# Added: account deletion workflow config — admin-email receives deletion notifications;
# from-email is used as the SMTP sender address
account:
  deletion:
    admin-email: ${ACCOUNT_DELETION_ADMIN_EMAIL:}
    from-email: ${ACCOUNT_DELETION_FROM_EMAIL:}

# Google Maps API configuration
google:
  maps:
    api-key: ${GOOGLE_MAPS_API_KEY:}
  oauth:
    client-id: ${GOOGLE_OAUTH_CLIENT_ID:}
    client-secret: ${GOOGLE_OAUTH_CLIENT_SECRET:}
    redirect-uri: ${GOOGLE_OAUTH_REDIRECT_URI:}
  storage:
    bucket-name: ${GOOGLE_STORAGE_BUCKET_NAME:}

apple:
  bundle-id: ${APPLE_BUNDLE_ID:com.smalltech.hashtaglocal}

# Base URL of the ops admin web app (hashtaglocal-frontend-web), linked from Slack alerts.
ops:
  base-url: ${OPS_BASE_URL:https://local.smalltech.in}

# Slack alert webhooks, keyed by channel. "default" is used when a more specific
# channel (review / cron / account_deletion) has no webhook of its own configured.
slack:
  webhooks:
    default: ${SLACK_WEBHOOK_URL:}
    review: ${SLACK_REVIEW_WEBHOOK_URL:}
    cron: ${SLACK_CRON_WEBHOOK_URL:}
    account_deletion: ${SLACK_ACCOUNT_DELETION_WEBHOOK_URL:}

management:
  health:
    diskspace:
      enabled: false
    db:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /v1/api-docs
  swagger-ui:
    path: /v1/swagger-ui.html
    enabled: true
    try-it-out-enabled: true
    display-request-duration: true
  paths-to-match:
    - /**
  default-consumes-media-type: application/json
  default-produces-media-type: application/json

firebase:
  credentials:
    path: ${FIREBASE_CREDENTIALS_PATH:firebase-key.json}

# Google Cloud Storage Configuration
gcs:
  credentials:
    path: gcs-key.json
  project:
    id: ${GCS_PROJECT_ID:}

geonames:
  username: ${GEONAMES_USERNAME:mmk1}

auth:
  access-token:
    expiry-seconds: ${AUTH_ACCESS_TOKEN_EXPIRY_SECONDS:10}
  refresh-token:
    expiry-seconds: ${AUTH_REFRESH_TOKEN_EXPIRY_SECONDS:30}
  session:
    cleanup-cron: ${AUTH_SESSION_CLEANUP_CRON:0 0 3 * * *}

events:
  scrape:
    # URL of the external scrape service that provides raw event data
    url: ${EVENTS_SCRAPE_URL:https://staging.api.smalltech.in/webscraperstaging/api/v1/scrape}
    # Cron expression for the ingestion job. Use '-' to disable. Override via EVENTS_SCRAPE_CRON env var.
    cron: ${EVENTS_SCRAPE_CRON:0 */5 * * * *}

# Per-hashtag feed / broadcast channel (see FEED_DESIGN.md)
feed:
  moderation:
    # When false (e.g. local dev without a key), user posts are FLAGGED for human review
    # instead of being auto-published. Never auto-publishes without AI.
    enabled: ${FEED_MODERATION_ENABLED:true}
    gemini-api-key: ${GEMINI_API_KEY:}
    model: ${FEED_MODERATION_MODEL:gemini-2.0-flash}
    endpoint: ${FEED_MODERATION_ENDPOINT:https://generativelanguage.googleapis.com/v1beta/models}
    # Retry sweeper interval for posts stuck in PENDING_AI
    sweeper-delay-ms: ${FEED_MODERATION_SWEEPER_DELAY_MS:60000}
  scrape:
    timeout-ms: ${FEED_SCRAPE_TIMEOUT_MS:8000}
    max-body-bytes: ${FEED_SCRAPE_MAX_BODY_BYTES:2097152}
    # Cap on the Open Graph image we re-host to GCS (5 MB default).
    max-image-bytes: ${FEED_SCRAPE_MAX_IMAGE_BYTES:5242880}
  auto-issue-ref:
    # Auto-post an ISSUE_REF to the feed when a new issue is created (FEED_DESIGN.md §1.2)
    enabled: ${FEED_AUTO_ISSUE_REF_ENABLED:true}

# City bulletin: daily weather (cron, saved-user localities only) + manual quizzes + Groq texts
bulletin:
  enabled: ${BULLETIN_ENABLED:true}
  weather:
    # Daily at 8:00 AM. Use '-' to disable.
    cron: ${BULLETIN_WEATHER_CRON:0 0 8 * * *}
    # Active WeatherProvider implementation; open-meteo is free and keyless.
    provider: ${BULLETIN_WEATHER_PROVIDER:open-meteo}
    open-meteo:
      url: ${BULLETIN_OPEN_METEO_URL:https://api.open-meteo.com/v1/forecast}

# Groq (weather summary + quiz explanation generation)
groq:
  api:
    key: ${GROQ_API_KEY:}
    url: ${GROQ_API_URL:https://api.groq.com/openai/v1/chat/completions}
    model: ${GROQ_MODEL:llama-3.3-70b-versatile}

portalissue:
  enabled: ${PORTALISSUE_ENABLED:true}
  cron: ${PORTALISSUE_CRON:0 0 1 * * *}
  scrape-url: ${PORTALISSUE_SCRAPE_URL:https://staging.api.smalltech.in/webscraperstaging/api/v1/scrape}
  report:
    scrape-url: ${PORTALISSUE_REPORT_SCRAPE_URL:https://staging.api.smalltech.in/webscraperstaging/api/v1/scrape}
    connect-timeout-seconds: ${PORTALISSUE_REPORT_CONNECT_TIMEOUT_SECONDS:15}
    read-timeout-seconds: ${PORTALISSUE_REPORT_READ_TIMEOUT_SECONDS:305}
  auth:
    username: ${PORTALISSUE_AUTH_USERNAME:placeholder_username}
    password: ${PORTALISSUE_AUTH_PASSWORD:placeholder_password}
