spring:
  application:
    name: hashtaglocal-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/hashtaglocal
    username: sai
    password: ""
    driver-class-name: org.postgresql.Driver

management:
  health:
    diskspace:
      enabled: false
    db:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    try-it-out-enabled: true
    display-request-duration: true
  show-actuator: true
  paths-to-match:
    - /**
    - /actuator/**
  write-operation-modes: true
  default-consumes-media-type: application/json
  default-produces-media-type: application/json