spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/hashtaglocaltest
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: Postgres

  jpa:
    hibernate:
      ddl-auto: create-drop
    defer-datasource-initialization: true
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

events:
  scrape:
    cron: "-"

portalissue:
  enabled: false

# Feed: keep the auto issue-ref and AI moderation out of unrelated issue/event tests.
# Feed-specific tests enable these explicitly.
feed:
  auto-issue-ref:
    enabled: false
  moderation:
    enabled: false
    sweeper-delay-ms: 3600000
