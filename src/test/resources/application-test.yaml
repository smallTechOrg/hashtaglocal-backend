spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/hashtaglocaltest
    driver-class-name: org.postgresql.Driver
    username: username
    password: password

  jpa:
    hibernate:
      ddl-auto: create-drop
    defer-datasource-initialization: true
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

# NewsAPI configuration for tests
newsapi:
  api-key: test-api-key