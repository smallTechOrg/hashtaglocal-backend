spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/hashtaglocaltest
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: Postgres

  jpa:
    hibernate:
      ddl-auto: create-drop
    defer-datasource-initialization: true
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
