name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - staging

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: Postgres
          POSTGRES_DB: hashtaglocaltest
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Build and test
        env:
          SPRING_PROFILES_ACTIVE: test
        run: ./gradlew clean build
      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: build/libs/hashtaglocal-backend-0.0.1-SNAPSHOT.jar
          retention-days: 1

  deploy-staging:
    needs: build-and-test
    if: github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: app-jar
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Deploy JAR to staging
        run: |
          gcloud compute scp hashtaglocal-backend-0.0.1-SNAPSHOT.jar \
            ${{ secrets.GCP_VM_INSTANCE_NAME_STAGING }}:/tmp/hashtaglocal-backend.jar \
            --zone=${{ secrets.GCP_ZONE_STAGING }} \
            --project=${{ secrets.GCP_PROJECT }} \
            --ssh-flag="-o StrictHostKeyChecking=no"

          gcloud compute ssh ${{ secrets.GCP_VM_INSTANCE_NAME_STAGING }} \
            --zone=${{ secrets.GCP_ZONE_STAGING }} \
            --project=${{ secrets.GCP_PROJECT }} \
            --ssh-flag="-o StrictHostKeyChecking=no" \
            --command="
              sudo mv /tmp/hashtaglocal-backend.jar /opt/hashtaglocal-backend/hashtaglocal-backend.jar &&
              sudo systemctl restart hashtaglocal-backend
            "
      - name: Health check
        run: |
          sleep 15
          gcloud compute ssh ${{ secrets.GCP_VM_INSTANCE_NAME_STAGING }} \
            --zone=${{ secrets.GCP_ZONE_STAGING }} \
            --project=${{ secrets.GCP_PROJECT }} \
            --ssh-flag="-o StrictHostKeyChecking=no" \
            --command="curl -sf http://localhost:8080/actuator/health || exit 1"

  deploy-production:
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: app-jar
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Deploy JAR to production
        run: |
          gcloud compute scp hashtaglocal-backend-0.0.1-SNAPSHOT.jar \
            ${{ secrets.GCP_VM_INSTANCE_NAME_PROD }}:/tmp/hashtaglocal-backend.jar \
            --zone=${{ secrets.GCP_ZONE_PROD }} \
            --project=${{ secrets.GCP_PROJECT }} \
            --ssh-flag="-o StrictHostKeyChecking=no"

          gcloud compute ssh ${{ secrets.GCP_VM_INSTANCE_NAME_PROD }} \
            --zone=${{ secrets.GCP_ZONE_PROD }} \
            --project=${{ secrets.GCP_PROJECT }} \
            --ssh-flag="-o StrictHostKeyChecking=no" \
            --command="
              sudo mv /tmp/hashtaglocal-backend.jar /opt/hashtaglocal-backend/hashtaglocal-backend.jar &&
              sudo systemctl restart hashtaglocal-backend
            "
      - name: Health check
        run: |
          sleep 15
          gcloud compute ssh ${{ secrets.GCP_VM_INSTANCE_NAME_PROD }} \
            --zone=${{ secrets.GCP_ZONE_PROD }} \
            --project=${{ secrets.GCP_PROJECT }} \
            --ssh-flag="-o StrictHostKeyChecking=no" \
            --command="curl -sf http://localhost:8080/actuator/health || exit 1"
